<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/Images/bop.gif">
    <title>Kopise</title>
    <style>
      body {
        font-family: 'Courier New', monospace;
        background-color: #FDF6E3;
        background-image: radial-gradient(#dda0d2 1px, transparent 1px);
        background-size: 25px 25px;

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      img {
        display: block;
      }

      .art-banner { 
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px
      }

      .landing-page-content {
        text-align: center;
      }

      .welcome {
        margin: 2px 0;
        line-height: 4;
      }

      .explore {
        margin: 2px 0;
        line-height: 2;
        padding-top: 40px;
      }

      .nah::after {
        content: "nah";
      }

      .nah:hover::after {
        content: "ok loser...";
      }

      .yes-link {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      }

      .yes-link:hover {
        color: #d48ac7;
      }

    </style>
  </head>
  <body>
    <div class="landing-page-content">
      <p class="welcome"> hiya! ♡ </p>
      <div class="art-banner">
        <img src="Images/kitty.png">
        <img src="Images/heart.gif">
        <img src="Images/bunny.png" alt="bunny">
      </div>
      <p class="welcome"> welcome to kopise </p>
      <p class="explore"> would you like to explore? <br>
      <a href="home.html" class="yes-link">yea!</a> | <span class="nah"></span></p>
    </div>
  </body>
</html>
